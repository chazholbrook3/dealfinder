<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DealFinder{% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0c0e0d;
      --bg2:      #151817;
      --bg3:      #1c1f1e;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.12);
      --green:    #3ddc84;
      --green-bg: #0e2a1a;
      --green-t:  #2ab86b;
      --amber:    #f5a623;
      --amber-bg: #2d1f00;
      --red:      #e05252;
      --red-bg:   #2d0f0f;
      --blue:     #5ab3f0;
      --blue-bg:  #0c1f30;
      --text:     #dde3e0;
      --text2:    #7d8c87;
      --text3:    #3d4d47;
      --mono:     'DM Mono', monospace;
      --sans:     'DM Sans', sans-serif;
      --radius:   10px;
    }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
      line-height: 1.5;
    }
    a { color: inherit; text-decoration: none; }

    /* Nav */
    nav {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 24px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: 32px;
    }
    .nav-logo-mark {
      width: 26px; height: 26px;
      background: var(--green);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-logo-mark svg { width: 14px; height: 14px; }
    .nav-logo-text {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.3px;
    }
    .nav-logo-text span { color: var(--green); }
    .nav-link {
      padding: 0 14px;
      height: 52px;
      display: flex;
      align-items: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--text); border-bottom-color: var(--green); }
    .nav-spacer { flex: 1; }
    .nav-badge {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--green-bg);
      color: var(--green-t);
      border: 1px solid rgba(61,220,132,0.2);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* Page wrapper */
    .page { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

    /* Page header */
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .page-header p { color: var(--text2); font-size: 13px; }

    /* Cards */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    /* Stat grid */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 600; font-family: var(--mono); }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.7px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* Badges */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-family: var(--mono);
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }
    .badge-new       { background: var(--green-bg); color: var(--green-t); }
    .badge-contacted { background: var(--blue-bg);  color: var(--blue);    }
    .badge-replied   { background: #1a2a3a;          color: #60b0e8;        }
    .badge-deal      { background: #102810;          color: #60dc80;        }
    .badge-dead      { background: var(--bg3);       color: var(--text2);   }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      border-radius: 7px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: var(--bg2); border-color: var(--border2); }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--green); color: #0c0e0d; border-color: transparent; font-weight: 600; }
    .btn-primary:hover { background: #4de896; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-danger { color: var(--red); border-color: rgba(224,82,82,0.3); }
    .btn-danger:hover { background: var(--red-bg); }

    /* Form elements */
    label.field-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text2);
      margin-bottom: 5px;
    }
    input[type=text], input[type=number], input[type=tel], select, textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      padding: 8px 11px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--green); }
    select option { background: var(--bg2); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-group { margin-bottom: 14px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      z-index: 999;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* Misc */
    .mono { font-family: var(--mono); }
    .text2 { color: var(--text2); }
    .green { color: var(--green-t); }
    .section-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.7px; }
    .empty { text-align: center; padding: 48px 24px; color: var(--text2); }
    .empty .empty-icon { font-size: 28px; margin-bottom: 10px; }
    .pill-img { width: 40px; height: 32px; object-fit: cover; border-radius: 5px; background: var(--bg3); }
  </style>
</head>
<body>
<nav>
  <div class="nav-logo">
    <div class="nav-logo-mark">
      <svg viewBox="0 0 14 14" fill="none"><path d="M2 11L7 3L12 11H2Z" fill="#0c0e0d"/><circle cx="7" cy="11" r="1.5" fill="#0c0e0d"/></svg>
    </div>
    <span class="nav-logo-text">Deal<span>Finder</span></span>
  </div>
  <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Dashboard</a>
  <a href="/leads" class="nav-link {% if request.endpoint in ['leads_page','lead_detail'] %}active{% endif %}">Leads</a>
  <a href="/filters" class="nav-link {% if request.endpoint == 'filters_page' %}active{% endif %}">Searches</a>
  <div class="nav-spacer"></div>
  {% if next_run %}
  <span class="nav-badge">Next scan {{ next_run }}</span>
  {% endif %}
</nav>

<div class="page">
  {% block content %}{% endblock %}
</div>

<div id="toast"></div>

<script>
function toast(msg, dur=2400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function copyText(text, label='Copied!') {
  navigator.clipboard.writeText(text).then(() => toast(label));
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
